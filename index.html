<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#16223C"/>
<title>만점 스나이퍼 · 천재 중2-1 국어 기말</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{min-height:100%}
body{
  --ink:#16223C;--ink2:#33425F;--bg:#E9ECF3;--card:#fff;--line:#DCE2EC;
  --amber:#F59E0B;--ambd:#C9760A;--indigo:#5B5BE6;--green:#0FA372;--red:#E5453C;--muted:#7C889E;
  font-family:'Noto Sans KR',-apple-system,sans-serif;
  color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;
}
.wrap{max-width:720px;margin:0 auto;padding:0 16px calc(80px + env(safe-area-inset-bottom))}
button{cursor:pointer;border:none;font-family:inherit;transition:transform .1s,background .12s}
button:active:not(:disabled){transform:translateY(1px)}

/* HERO */
.hero{background:radial-gradient(120% 100% at 80% -10%,#21345C 0%,#16223C 55%);
  border-radius:22px;padding:26px 22px 22px;color:#fff;margin-top:20px}
.eyebrow{font-size:11px;letter-spacing:.2em;color:var(--amber);font-weight:700;margin-bottom:7px}
.hero h1{font-family:'Black Han Sans',sans-serif;font-size:34px;line-height:1;margin-bottom:8px}
.hero h1 b{color:var(--amber)}
.hero p{color:#B7C2D8;font-size:13px}
.stats{display:flex;gap:18px;margin-top:16px;flex-wrap:wrap}
.stat .n{font-family:'Black Han Sans';font-size:22px;color:#fff}
.stat .l{font-size:11px;color:#90A0BC;margin-top:1px}

.sh{display:flex;align-items:center;gap:8px;margin:22px 2px 10px}
.sh .bar{width:5px;height:16px;background:var(--amber);border-radius:3px;flex-shrink:0}
.sh h2{font-size:15px;font-weight:900}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ic{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 14px}
.ic .it{font-size:10.5px;font-weight:700;color:var(--muted);margin-bottom:3px}
.ic .iv{font-size:13px;font-weight:700}
.notice{background:#FFF7E8;border:1px solid #F3DCA8;border-radius:13px;padding:13px 15px;
  font-size:13px;color:#8a6400;margin-top:10px;line-height:1.8}
.notice b{color:var(--ambd)}

.start{width:100%;margin-top:14px;background:var(--ink);color:#fff;font-weight:900;
  font-size:17px;padding:17px;border-radius:15px;display:flex;align-items:center;justify-content:center;gap:10px}
.start:hover{box-shadow:0 8px 24px rgba(22,34,60,.28);transform:translateY(-2px)!important}
.start .go{background:var(--amber);color:var(--ink);padding:5px 13px;border-radius:8px;font-size:13px}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:8px;padding:16px 2px 4px;flex-wrap:wrap}
.pill{font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px;color:#fff;white-space:nowrap}
.qcnt{margin-left:auto;font-family:'Black Han Sans';font-size:13px;color:var(--ink2);
  background:var(--card);border:1px solid var(--line);padding:5px 11px;border-radius:9px;white-space:nowrap}

/* PROGRESS */
.pb-wrap{height:5px;background:#D1D8E5;border-radius:99px;margin:6px 2px 0;overflow:hidden}
.pb-fill{height:100%;background:var(--amber);border-radius:99px;transition:width .35s ease}

/* PHASE BANNER */
.phase-banner{background:var(--ink);color:#fff;border-radius:13px;padding:12px 16px;
  margin:12px 0;display:flex;align-items:center;gap:10px;font-weight:700;font-size:13.5px}
.phase-banner .pico{font-size:20px}
.phase-banner .psub{font-size:11.5px;color:#9DAAC4;margin-top:2px;font-weight:400}

/* QCARD */
.qcard{background:var(--card);border:1px solid var(--line);border-radius:18px;
  padding:20px 18px;margin-top:12px;animation:fu .22s ease}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.qtag{font-size:10.5px;font-weight:700;color:var(--ambd);letter-spacing:.04em;margin-bottom:5px}
.qtext{font-size:16px;font-weight:700;line-height:1.5;margin-bottom:2px}
.passage{background:#F4F6FA;border-left:4px solid var(--ink2);border-radius:0 10px 10px 0;
  padding:11px 14px;margin:11px 0 4px;font-size:13.5px;color:var(--ink2);white-space:pre-line;line-height:1.65}
.cond-box{background:#FFF7E8;border:1px solid #F3DCA8;border-radius:10px;
  padding:10px 13px;margin:10px 0 4px;font-size:13px;color:#8a6400;line-height:1.7}
.cond-box b{color:var(--ambd)}

/* CHOICES */
.choices{display:grid;gap:7px;margin-top:12px}
.ch{background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:12px 13px;
  display:flex;gap:9px;align-items:flex-start;text-align:left;font-size:14px;width:100%;color:var(--ink)}
.ch:hover{border-color:#8895B0;background:#F7F9FC}
.ch.picked{border-color:var(--ink);background:#F0F3FB;font-weight:700}
.ch .cn{font-weight:900;flex:0 0 auto;min-width:18px}
.ch:disabled{cursor:default}

/* ESSAY */
.essay-wrap{margin-top:14px}
.essay-label{font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:6px;
  display:flex;align-items:center;gap:6px}
.essay-label span{background:var(--red);color:#fff;font-size:10px;padding:2px 7px;border-radius:99px}
.essay-ta{width:100%;padding:13px 15px;border:2px solid var(--line);
  border-radius:12px;font-family:inherit;font-size:14.5px;color:var(--ink);
  resize:vertical;outline:none;transition:border .15s;line-height:1.7;background:#FAFBFD}
.essay-ta:focus{border-color:var(--indigo);background:#fff}
.essay-hint{font-size:12px;color:var(--muted);margin-top:7px;line-height:1.6}

/* NAV BUTTON */
.nav-btn{width:100%;margin-top:14px;background:var(--ink);color:#fff;font-weight:900;
  font-size:15.5px;padding:16px;border-radius:13px}
.nav-btn:disabled{background:#AEB8CA;cursor:not-allowed}
.nav-btn.amber{background:var(--amber);color:var(--ink)}

/* RESULT */
.res-hero{background:var(--ink);color:#fff;border-radius:22px;padding:26px 20px;
  text-align:center;margin-top:20px}
.ring{width:140px;height:140px;margin:6px auto 4px;border-radius:50%;position:relative}
.ring-inner{position:absolute;inset:10px;display:grid;place-items:center;
  background:var(--ink);border-radius:50%}
.ring-inner b{font-family:'Black Han Sans';font-size:42px;line-height:.9}
.ring-inner small{font-size:11px;color:#9DAAC4}
.res-sub{font-size:13px;color:#B7C2D8;margin-top:5px}
.res-sub b{color:var(--amber)}
.grade{display:inline-block;margin-top:9px;padding:5px 16px;border-radius:999px;font-weight:900;font-size:13.5px}
.area-row{display:flex;gap:9px;margin-top:12px;flex-wrap:wrap}
.acard{flex:1;min-width:100px;background:var(--card);border:1px solid var(--line);
  border-radius:13px;padding:12px 14px;text-align:center}
.acard .at{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:3px}
.acard .av{font-family:'Black Han Sans';font-size:22px}

/* WRONG ITEMS */
.wrong-wrap{margin-top:20px}
.wrong-item{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:17px;margin-bottom:11px;animation:fu .28s ease}
.wrong-hd{font-size:11px;font-weight:700;color:var(--red);margin-bottom:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.wrong-qt{font-size:14.5px;font-weight:700;margin-bottom:10px;line-height:1.45}
.tag-box{margin-bottom:10px}
.my-tag{background:#FCECEB;border-radius:9px;padding:8px 12px;font-size:13px;color:var(--red);margin-bottom:6px}
.ok-tag{background:#E8F8F1;border-radius:9px;padding:8px 12px;font-size:13px;color:var(--green);font-weight:700;margin-bottom:6px}
.model-box{background:#E8F8F1;border-radius:10px;padding:12px 14px;font-size:13.5px;margin-bottom:6px;line-height:1.65}
.model-label{font-size:10.5px;font-weight:700;color:var(--green);margin-bottom:4px}
.rub-box{background:#FCECEB;border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:8px}
.rub-label{font-size:10.5px;font-weight:700;color:var(--red);margin-bottom:5px}
.rub-box ul{padding-left:16px}
.rub-box li{margin:3px 0}
.eb{border-radius:11px;padding:11px 13px;font-size:13.5px;margin-bottom:5px;line-height:1.6}
.eb-con{background:#EEEFFE}
.eb-rea{background:#E8F8F1}
.eb-kil{background:#FCECEB;border:1.5px solid #F6C9C6}
.eh{font-weight:900;font-size:11.5px;display:flex;align-items:center;gap:5px;margin-bottom:4px}
.mk{width:16px;height:16px;border-radius:4px;display:grid;place-items:center;
  color:#fff;font-size:10px;font-weight:900;flex-shrink:0}
.mk-c{background:var(--indigo)}.mk-r{background:var(--green)}.mk-k{background:var(--red)}
.kstar{margin-left:auto;font-size:9.5px;background:var(--red);color:#fff;padding:1px 6px;border-radius:999px}

.act-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
.act{padding:13px;border-radius:12px;font-weight:900;font-size:14px}
.act-p{background:var(--ink);color:#fff}
.act-s{background:var(--card);border:1px solid var(--line);color:var(--ink)}
.perfect{background:linear-gradient(135deg,#0FA372,#0b7a5c);color:#fff;border-radius:14px;
  padding:18px;text-align:center;font-weight:900;font-size:17px;margin-top:14px}
.foot{text-align:center;color:var(--muted);font-size:11px;margin-top:28px}

@media(max-width:480px){.hero h1{font-size:28px}.igrid{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
'use strict';
/* =====================================================================
   천재(노미숙) 중2-1 국어 기말 — 2단원 전체 + 4단원 개성적인 발상과 표현
   흐름: 객관식 전체 → 단답형 전체 → 서술형 전체 → 채점 결과
   규칙: 중간 정오 표시 없음 / 뒤로 가기 없음
   ===================================================================== */

var NUM = '①②③④⑤';

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

/* ─────────── 문제 데이터 ─────────── */
var Q_OBJ = [
/* ══ 2단원 ① 공감하고 존중하며 대화하기 ══ */
{unit:'2단원', sub:'공감·대화', type:'obj',
 passage:'[대화]\n수진: "어제 발표 진짜 망한 것 같아. 다들 나만 쳐다보는데 너무 떨렸어."\n지호: "아, 그 발표? 나도 작년에 비슷했는데, 나는 그냥 외워서 했더니 잘 됐어. 다음엔 그렇게 해봐."\n수진: "……(말이 없다)"',
 q:'위 대화에서 지호의 반응이 수진의 말문을 막는 이유로 가장 적절한 것은?',
 choices:['지호가 수진의 발표 내용을 직접 평가했기 때문이다','수진의 감정에 공감하기 전에 자신의 경험과 해결책을 제시하여 수진이 이해받지 못했다고 느끼기 때문이다','지호가 과거 경험을 말한 것 자체가 대화 맥락에서 벗어나기 때문이다','지호가 발표 방법을 구체적으로 알려줘 수진이 부담을 느끼기 때문이다','지호의 말이 수진의 발표를 무시하는 표현을 포함하고 있기 때문이다'],
 ans:1,
 con:'공감적 대화에서는 상대의 감정을 먼저 인정하는 것이 핵심이다. 해결책 제시는 공감 이후에 이뤄져야 한다.',
 rea:'수진은 감정적 위로가 필요한 상황인데, 지호는 공감 없이 바로 자기 경험과 해결책을 제시했다. 수진이 이해받지 못했다고 느끼므로 말이 없어진 것이다.',
 kil:'③ 과거 경험 자체가 문제가 아니라, 순서(공감 먼저→경험 나중)가 잘못된 것이다.'},

{unit:'2단원', sub:'공감·대화', type:'obj',
 q:'다음 중 나 전달법(I-message)의 3단계 구조(행동 묘사→영향→감정)를 가장 완전하게 갖춘 것은?',
 choices:['네가 약속을 자꾸 어겨서 나는 화가 나.','네가 어제 약속 시간에 30분 늦게 왔을 때, 나는 혼자 기다리다 걱정이 됐고, 그게 많이 속상했어.','나는 네 행동이 이해가 안 돼서 화가 나.','나는 오늘 정말 힘들었어. 네가 도와줬으면 했어.','나는 항상 네가 먼저 연락해줬으면 해.'],
 ans:1,
 con:'나 전달법 3단계: ①행동 묘사(구체적 사실)→②영향(나에게 미친 결과)→③감정(나의 감정). 세 요소가 모두 있어야 완전하다.',
 rea:'②: 30분 늦게 왔을 때(행동)→혼자 기다리다 걱정이 됐고(영향)→속상했어(감정), 3단계 모두 충족.',
 kil:'①은 행동과 감정만 있고 영향이 빠졌다. 나 전달법처럼 보이지만 불완전하다는 것이 함정.'},

{unit:'2단원', sub:'공감·대화', type:'obj',
 passage:'[갈등 조정 상황]\nA: "나는 PPT 만드는 건 정말 못해. 다른 걸 할게."\nB: "그럼 또 나만 PPT 하라고? 지난번에도 그랬잖아."\nA: "……(팔짱을 끼고 시선을 돌린다)"',
 q:'갈등 조정을 위해 A가 취해야 할 가장 효과적인 다음 행동은?',
 choices:['B의 말을 무시하고 자신이 할 수 있는 역할만 제안한다','팔짱을 풀고 B와 눈을 맞추며, 지난번에 부담을 줬다는 것을 인정하고 이번에는 함께 PPT 작업을 배워가겠다고 제안한다','B가 PPT를 잘하니까 B가 하는 것이 효율적이라고 논리적으로 설명한다','선생님에게 역할 분담을 대신 결정해 달라고 요청한다','지난번 상황은 어쩔 수 없었다고 해명하며 자신의 입장을 다시 주장한다'],
 ans:1,
 con:'갈등 조정은 ①상대 감정 인정 ②자신의 역할 인정 ③구체적 타협안 제시 세 단계가 필요하다. 비언어 표현(팔짱)도 먼저 수정해야 한다.',
 rea:'②는 비언어 표현(팔짱)을 수정하고, B의 부담을 인정하며, 구체적 타협안을 제시한다.',
 kil:'③처럼 논리적 설명은 B의 감정을 무시한 것이다. 감정 인정이 논리보다 선행돼야 한다.'},

{unit:'2단원', sub:'공감·대화', type:'obj',
 passage:'[대화]\n민아: "이번 주 토요일 같이 영화 볼 수 있어?"\n준서: "토요일에 우리 집에서 가족 모임이 있는데, 엄마가 꼭 오라고 하셔서."',
 q:'준서의 발화에 대한 설명으로 가장 적절한 것은?',
 choices:['민아의 질문에 직접적인 답을 하지 않아 대화의 협력 원칙을 어겼다','직접적으로 못 간다고 말하지 않았지만, 가족 모임과 어머니 요청을 언급함으로써 간접적으로 거절의 의미를 전달하고 있다','준서의 발화는 대화의 관련성 원칙을 어겼다','준서는 민아의 감정을 배려하지 않고 자신의 상황만 설명했다','준서가 명확하게 답하지 않은 것은 의사소통 능력이 부족하기 때문이다'],
 ans:1,
 con:'발화는 표면적 의미와 실제 의미가 다를 수 있다. 맥락을 통해 간접적으로 의미를 전달하는 것은 대화의 정상적 작동 방식이다.',
 rea:'준서는 못 간다고 명시하지 않았지만 가족 모임+어머니 요청이라는 맥락으로 거절을 전달한다. 협력 원칙을 어긴 것이 아니라 함축 의미를 활용한 것이다.',
 kil:'①은 오답이다. 직접 말하지 않음은 원칙 위반이 아니다. 맥락을 통해 충분히 의사를 전달했다.'},

/* ══ 2단원 ② 피동 표현과 인용 표현 ══ */
{unit:'2단원', sub:'피동·인용 표현', type:'obj',
 passage:'ㄱ. 유리창이 돌에 깨졌다.\nㄴ. 아이가 엄마에게 안겼다.\nㄷ. 그 사실이 사람들에게 알려졌다.\nㄹ. 사건이 조용히 마무리되었다.',
 q:'위 문장들을 피동 표현의 형성 방식에 따라 바르게 분류한 것은?',
 choices:['피동 접미사: ㄱ,ㄴ,ㄷ / -어지다: ㄹ','피동 접미사: ㄴ / -어지다: ㄱ,ㄷ / -게 되다: ㄹ','피동 접미사: ㄴ,ㄷ / -어지다: ㄱ / -게 되다: ㄹ','피동 접미사: ㄱ,ㄴ / -어지다: ㄷ / -게 되다: ㄹ','모두 피동 접미사로 만들어진 피동 표현이다'],
 ans:3,
 con:'피동 접미사(-이-/-히-/-리-/-기-): 안기다(-기-), 깨지다(-지-). -어지다: 동사 뒤에 어지다 결합. 알려지다=알리다(사동)+어지다(사동의 피동).',
 rea:'ㄱ 깨지다(접미사), ㄴ 안기다(접미사), ㄷ 알려지다(사동+어지다), ㄹ 마무리되다(-게 되다 유사형). 따라서 접미사: ㄱ,ㄴ / 어지다: ㄷ / 되다: ㄹ.',

  var out = '<div class="topbar">' +
    '<span class="pill" style="background:'+unitColor+'">'+q.unit+'</span>' +
    '<span class="pill" style="background:'+typeBg+'">'+typeLabel+'</span>' +
    '<span class="qcnt">'+(S.idx+1)+' / '+TOTAL+'</span>' +
    '</div>' +
    '<div class="pb-wrap"><div class="pb-fill" style="width:'+pct+'%"></div></div>' +
    phaseBanner;

  /* 문제 카드 */
  out += '<div class="qcard">' +
    '<div class="qtag">Q'+(S.idx+1)+' · '+esc(q.sub)+'</div>' +
    '<div class="qtext">'+esc(q.q)+'</div>' +
    (q.passage ? '<div class="passage">'+esc(q.passage)+'</div>' : '') +
    (q.cond    ? '<div class="cond-box"><b>조건</b> · '+esc(q.cond)+'</div>' : '');

  if (q.type === 'obj') {
    /* 객관식: 선지를 qcard 안에 */
    out += '<div class="choices">';
    for (var i = 0; i < q.choices.length; i++) {
      out += '<button class="ch" data-act="pick" data-i="'+i+'">' +
        '<span class="cn">'+NUM[i]+'</span><span>'+esc(q.choices[i])+'</span></button>';
    }
    out += '</div>';
    out += '</div>'; /* qcard 끝 */
    out += '<div class="foot" style="margin-top:12px">선지를 누르면 자동으로 다음 문제로 이동합니다.</div>';

  } else {
    /* 단답형·서술형: textarea를 qcard 안에, 버튼은 qcard 밖 */
    var rows  = q.type === 'short' ? '3' : '8';
    var phTxt = q.type === 'short'
      ? '답을 한 문장으로 입력하세요.'
      : '서술형 답을 입력하세요.\n(조건에 맞춰 구체적으로 서술하세요.)';

    out += '<div class="essay-wrap">' +
      '<div class="essay-label">내 답 <span>'+(q.type==='short'?'단답형':'서술형')+'</span></div>' +
      '<textarea class="essay-ta" id="essay-ta" rows="'+rows+'" placeholder="'+phTxt+'"></textarea>' +
      '<div class="essay-hint">✏️ 작성 후 아래 버튼을 눌러 다음으로 이동하세요.<br>' +
      '채점은 모든 문항이 끝난 후 모범답안으로 진행합니다.</div>' +
      '</div>';

    out += '</div>'; /* qcard 끝 */

    /* 다음 버튼: qcard 밖 독립 영역 */
    out += '<button class="nav-btn amber" id="essay-btn" data-act="essay-next">' +
      (isLast ? '채점 결과 보기 →' : '다음 문제 →') +
    '</button>';
  }

  return out;
}

/* ── RESULT ── */
function viewResult() {
  /* 객관식 채점 */
  var objScore = 0;
  var wrongIdx = [];
  for (var i = 0; i < TOTAL; i++) {
    var q = ALL_Q[i];
    var p = S.picks[i];
    var correct = false;
    if (q.type === 'obj') {
      correct = (p === q.ans);
    }
    /* 단답·서술형은 셀프 채점이므로 correct=false, 해설만 표시 */
    if (!correct) wrongIdx.push(i);
    else objScore++;
  }

  var pct = Math.round(objScore / Q_OBJ.length * 100);
  var deg = objScore / Q_OBJ.length * 360;
  var grade, gc;
  if (pct >= 90) { grade = 'A+  완벽에 가까워!'; gc = '#0FA372'; }
  else if (pct >= 80) { grade = 'A  훌륭해!'; gc = '#3B82F6'; }
  else if (pct >= 70) { grade = 'B  잘 했어!'; gc = '#8B5CF6'; }
  else if (pct >= 60) { grade = 'C  조금 더 힘내!'; gc = '#F59E0B'; }
  else { grade = 'D  틀린 문제 꼭 복습!'; gc = '#E5453C'; }

  /* 영역별 */
  var u2s=0,u2t=0,u4s=0,u4t=0;
  for (var j = 0; j < Q_OBJ.length; j++) {
    var qj = Q_OBJ[j];
    if (qj.unit === '2단원') { u2t++; if (S.picks[j]===qj.ans) u2s++; }
    else { u4t++; if (S.picks[j]===qj.ans) u4s++; }
  }

  var out = '<div class="res-hero">' +
    '<div class="eyebrow">기말고사 모의 채점 결과</div>' +
    '<div class="ring" style="background:conic-gradient('+gc+' '+deg+'deg,rgba(255,255,255,.12) 0)">' +
      '<div class="ring-inner">' +
        '<b>'+objScore+'<span style="font-size:18px;color:#9DAAC4">/'+Q_OBJ.length+'</span></b>' +
        '<small>객관식 정답</small>' +
      '</div>' +
    '</div>' +
    '<div class="res-sub">객관식 정확도 <b>'+pct+'%</b> · 단답+서술 <b>'+(Q_SHORT.length+Q_ESSAY.length)+'문항</b> → 아래 모범답안으로 셀프 채점</div>' +
    '<div class="grade" style="background:'+gc+'">'+grade+'</div>' +
    '</div>' +
    '<div class="area-row">' +
      '<div class="acard"><div class="at">2단원 객관식</div><div class="av">'+u2s+'/'+u2t+'</div></div>' +
      '<div class="acard"><div class="at">4단원 객관식</div><div class="av">'+u4s+'/'+u4t+'</div></div>' +
    '</div>';

  /* 틀린 문제 + 단답·서술 해설 */
  out += '<div class="wrong-wrap">';
  out += '<div class="sh"><div class="bar"></div><h2>틀린 문제 & 서술형 해설</h2>' +
    '<span>'+wrongIdx.length+'항목</span></div>';

  wrongIdx.forEach(function(wi) {
    var wq = ALL_Q[wi];
    var uc = wq.unit === '2단원' ? '#5B5BE6' : '#E07B00';
    var typeBg2 = wq.type==='obj'?'#16223C':wq.type==='short'?'#0FA372':'#E5453C';
    var typeL2  = wq.type==='obj'?'객관식':wq.type==='short'?'단답형':'서술형';

    out += '<div class="wrong-item">' +
      '<div class="wrong-hd">' +
        'Q'+(wi+1)+' &nbsp;' +
        '<span class="pill" style="background:'+uc+';font-size:10px;padding:3px 8px">'+wq.unit+'</span>&nbsp;' +
        '<span class="pill" style="background:'+typeBg2+';font-size:10px;padding:3px 8px">'+typeL2+'</span>' +
      '</div>' +
      (wq.passage ? '<div class="passage" style="margin-bottom:8px">'+esc(wq.passage)+'</div>' : '') +
      '<div class="wrong-qt">'+esc(wq.q)+'</div>' +
      (wq.cond ? '<div class="cond-box" style="margin-bottom:8px"><b>조건</b> · '+esc(wq.cond)+'</div>' : '');

    if (wq.type === 'obj') {
      var my = S.picks[wi];
      var myL = (my !== null && my !== undefined) ? NUM[my]+' '+wq.choices[my] : '미선택';
      out += '<div class="tag-box">' +
        '<div class="my-tag">❌ 내 답: '+esc(myL)+'</div>' +
        '<div class="ok-tag">✅ 정답: '+NUM[wq.ans]+' '+esc(wq.choices[wq.ans])+'</div>' +
        '</div>';
    } else {
      var myTxt = (S.picks[wi] && String(S.picks[wi]).trim()) ? String(S.picks[wi]) : '(미입력)';
      out += '<div class="tag-box">' +
        '<div class="my-tag">📝 내 답:<br>'+esc(myTxt)+'</div>' +
        '<div class="model-box"><div class="model-label">✅ 모범 답안</div>'+esc(wq.ans)+'</div>';
      if (wq.rub) {
        out += '<div class="rub-box"><div class="rub-label">📋 감점 기준</div><ul>';
        wq.rub.forEach(function(r){ out += '<li>'+esc(r)+'</li>'; });
        out += '</ul></div>';
      }
      out += '</div>';
    }

    out += '<div class="eb eb-con"><div class="eh"><span class="mk mk-c">개</span>개념 매핑</div>'+esc(wq.con)+'</div>' +
      '<div class="eb eb-rea"><div class="eh"><span class="mk mk-r">✓</span>정답인 이유</div>'+esc(wq.rea)+'</div>' +
      '<div class="eb eb-kil"><div class="eh"><span class="mk mk-k">✕</span>오답 킬러<span class="kstar">★ 핵심</span></div>'+esc(wq.kil)+'</div>' +
    '</div>';
  });

  out += '</div>'; /* wrong-wrap 끝 */
  out += '<div class="act-row">' +
    '<button class="act act-p" data-act="retry">다시 풀기</button>' +
    '<button class="act act-s" data-act="home">홈으로</button>' +
    '</div>' +
    '<div class="foot">틀린 문제의 [오답 킬러]를 형광펜처럼 체크해봐!</div>';

  return out;
}

/* ─────────── 이벤트 ─────────── */
appEl.addEventListener('click', function(ev) {
  var t = ev.target.closest('[data-act]');
  if (!t) return;
  var a = t.getAttribute('data-act');

  if (a === 'start') {
    S.mode = 'quiz'; S.idx = 0; S.picks = [];
    render();

  } else if (a === 'home') {
    S.mode = 'home'; render();

  } else if (a === 'retry') {
    S.mode = 'quiz'; S.idx = 0; S.picks = [];
    render();

  } else if (a === 'pick') {
    /* 객관식: 이미 선택했으면 무시 */
    if (S.picks[S.idx] !== undefined) return;
    var i = parseInt(t.getAttribute('data-i'), 10);
    S.picks[S.idx] = i;

    /* 선택 선지에 체크만, 정오 색 없음 */
    appEl.querySelectorAll('.ch').forEach(function(c) { c.disabled = true; });
    t.classList.add('picked');
    var cnSpan = t.querySelector('.cn');
    if (cnSpan) cnSpan.textContent += ' ✔';

    /* 0.45초 후 자동 이동 */
    setTimeout(function() {
      S.idx++;
      if (S.idx >= TOTAL) { S.mode = 'result'; }
      render();
    }, 450);

  } else if (a === 'essay-next') {
    var ta = document.getElementById('essay-ta');
    S.picks[S.idx] = ta ? ta.value : '';
    S.idx++;
    if (S.idx >= TOTAL) { S.mode = 'result'; }
    render();
  }
});

render();
</script>
</body>
</html>
