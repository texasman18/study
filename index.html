<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#16223C"/>
<title>만점 스나이퍼 · 천재 중2-1 국어 기말 대비</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{
  --ink:#16223C;--ink2:#33425F;--bg:#E9ECF3;--card:#fff;--line:#DCE2EC;
  --amber:#F59E0B;--ambd:#C9760A;--indigo:#5B5BE6;--green:#0FA372;--red:#E5453C;--muted:#7C889E;
  font-family:'Noto Sans KR',-apple-system,sans-serif;
  color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;
}
.wrap{max-width:760px;margin:0 auto;padding:0 16px calc(72px + env(safe-area-inset-bottom))}
button{cursor:pointer;border:none;font-family:inherit;transition:transform .12s,box-shadow .12s,background .15s}
button:active{transform:translateY(1px)}

/* HERO */
.hero{background:radial-gradient(120% 100% at 80% -10%,#21345C 0%,#16223C 55%);
  border-radius:24px;padding:28px 24px 24px;color:#fff;position:relative;overflow:hidden;margin-top:20px}
.eyebrow{font-size:11.5px;letter-spacing:.22em;color:var(--amber);font-weight:700;margin-bottom:8px}
.hero h1{font-family:'Black Han Sans',sans-serif;font-size:38px;line-height:1;margin-bottom:8px}
.hero h1 b{color:var(--amber)}
.hero p{color:#B7C2D8;font-size:13.5px;max-width:380px}
.stats{display:flex;gap:20px;margin-top:18px}
.stat .n{font-family:'Black Han Sans';font-size:24px;color:#fff;line-height:1}
.stat .l{font-size:11px;color:#90A0BC;margin-top:2px}

/* UNIT BADGES */
.unit-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.ubadge{padding:7px 14px;border-radius:10px;font-size:12.5px;font-weight:700;color:#fff}

/* SECTION */
.sh{display:flex;align-items:baseline;gap:8px;margin:26px 2px 12px}
.sh .bar{width:5px;height:17px;background:var(--amber);border-radius:3px;flex-shrink:0}
.sh h2{font-size:15.5px;font-weight:900}
.sh span{font-size:11.5px;color:var(--muted);margin-left:auto}

/* START BUTTON */
.start-btn{width:100%;background:var(--ink);color:#fff;font-weight:900;font-size:17px;
  padding:18px;border-radius:16px;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:10px}
.start-btn:hover{box-shadow:0 8px 24px rgba(22,34,60,.28);transform:translateY(-2px)}
.start-btn .go{background:var(--amber);color:var(--ink);padding:6px 14px;border-radius:8px;font-size:13px}

/* INFO CARDS */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.icard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.icard .it{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;letter-spacing:.04em}
.icard .iv{font-size:13.5px;font-weight:700}

/* QUIZ TOP BAR */
.topbar{display:flex;align-items:center;gap:10px;padding:16px 2px 6px}
.exit-btn{background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:7px 12px;font-size:13px;font-weight:700;color:var(--ink2)}
.pill{font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:999px;color:#fff}
.qcnt{margin-left:auto;font-family:'Black Han Sans';font-size:14px;color:var(--ink2);
  background:var(--card);border:1px solid var(--line);padding:5px 12px;border-radius:10px}

/* PROGRESS BAR */
.progbar-wrap{height:6px;background:#D1D8E5;border-radius:99px;margin:8px 2px 0;overflow:hidden}
.progbar-fill{height:100%;background:var(--amber);border-radius:99px;transition:width .4s ease}

/* QUESTION CARD */
.qcard{background:var(--card);border:1px solid var(--line);border-radius:18px;
  padding:22px 20px;margin-top:14px;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.qtag{font-size:11px;font-weight:700;color:var(--ambd);letter-spacing:.04em;margin-bottom:6px}
.qtext{font-size:16.5px;font-weight:700;line-height:1.5}
.passage{background:#F4F6FA;border-left:4px solid var(--ink2);border-radius:0 10px 10px 0;
  padding:12px 15px;margin:12px 0 4px;font-size:14px;color:var(--ink2);white-space:pre-line;line-height:1.65}

/* CHOICES */
.choices{display:grid;gap:8px;margin-top:14px}
.ch{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;
  display:flex;gap:10px;align-items:flex-start;text-align:left;font-size:14.5px;width:100%;color:var(--ink)}
.ch:hover:not(:disabled){border-color:#8895B0;background:#F7F9FC}
.ch.sel{border-color:var(--ink);background:#F2F5FB}
.ch .cn{font-weight:900;flex:0 0 auto;min-width:18px}

/* NAV BUTTONS */
.nav-next{width:100%;margin-top:14px;background:var(--ink);color:#fff;font-weight:900;
  font-size:16px;padding:15px;border-radius:13px}
.nav-next:disabled{background:#AEB8CA}

/* RESULT PAGE */
.result-hero{background:var(--ink);color:#fff;border-radius:24px;padding:28px 22px;
  text-align:center;margin-top:20px}
.score-ring{width:150px;height:150px;margin:8px auto 4px;position:relative;border-radius:50%}
.score-inner{position:absolute;inset:11px;display:grid;place-items:center;
  background:var(--ink);border-radius:50%}
.score-inner b{font-family:'Black Han Sans';font-size:44px;line-height:.9}
.score-inner small{font-size:11px;color:#9DAAC4}
.score-sub{font-size:14px;color:#B7C2D8;margin-top:6px}
.score-sub b{color:var(--amber)}
.grade-tag{display:inline-block;margin-top:10px;padding:6px 18px;border-radius:999px;
  font-weight:900;font-size:14px}

/* WRONG LIST */
.wrong-section{margin-top:20px}
.wrong-item{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px 18px;margin-bottom:12px;animation:fadeUp .3s ease}
.wrong-hd{font-size:12px;font-weight:700;color:var(--red);margin-bottom:6px;letter-spacing:.03em}
.wrong-qtext{font-size:15px;font-weight:700;margin-bottom:10px;line-height:1.45}
.wrong-my{background:#FCECEB;border-radius:9px;padding:9px 12px;font-size:13px;margin-bottom:6px;color:var(--red)}
.wrong-ans{background:#E8F8F1;border-radius:9px;padding:9px 12px;font-size:13px;margin-bottom:10px;color:var(--green);font-weight:700}
.exp-block{border-radius:12px;padding:12px 14px;font-size:13.5px;margin-bottom:6px}
.exp-b-con{background:#EEEFFE}.exp-b-con .eh{color:var(--indigo)}
.exp-b-rea{background:#E8F8F1}.exp-b-rea .eh{color:var(--green)}
.exp-b-kil{background:#FCECEB;border:1.5px solid #F6C9C6}.exp-b-kil .eh{color:var(--red)}
.eh{font-weight:900;font-size:12px;letter-spacing:.02em;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.eh .mk{width:17px;height:17px;border-radius:5px;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:900;flex-shrink:0}
.con-mk{background:var(--indigo)}.rea-mk{background:var(--green)}.kil-mk{background:var(--red)}
.kil-star{margin-left:auto;font-size:10px;background:var(--red);color:#fff;padding:2px 6px;border-radius:999px}

/* ACTION BUTTONS */
.act-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.act-btn{padding:14px;border-radius:13px;font-weight:900;font-size:14px}
.act-p{background:var(--ink);color:#fff}
.act-s{background:var(--card);border:1px solid var(--line);color:var(--ink)}
.act-full{grid-column:1/3;background:var(--amber);color:var(--ink);font-size:15px}

.foot{text-align:center;color:var(--muted);font-size:11px;margin-top:30px}

/* ALL CORRECT BANNER */
.perfect{background:linear-gradient(135deg,#0FA372,#0C8A60);color:#fff;border-radius:16px;
  padding:20px;text-align:center;margin-top:16px;font-weight:900;font-size:18px}

@media(max-width:480px){.hero h1{font-size:32px}.info-grid{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* =====================================================================
   천재(노미숙) 중2-1 국어 기말 — 2단원 전체 + 4단원 개성적인 발상과 표현
   UX: 전체 풀기 → 마지막에 총점 + 틀린 문제 해설
   ===================================================================== */

var NUM = "①②③④⑤";

/* ── 2단원: 소통으로 여는 세상 ─────────────────────────────────────────
   소단원①: 공감하고 존중하며 대화하기 (담화, 대화 방법, 갈등 조정)
   소단원②: 피동 표현과 인용 표현 활용하기
   ─────────────────────────────────────────────────────────────────── */
var Q2 = [
  /* ── ① 공감·대화 ── */
  {unit:"2단원",sub:"공감하고 존중하며 대화하기",
   q:"대화에서 '공감적 듣기'의 방법으로 알맞지 않은 것은?",
   choices:["상대의 말을 끊지 않고 끝까지 듣는다","상대의 감정을 파악하며 반응한다","자신의 경험담을 계속 이야기하며 상대 말을 평가한다","적절한 고개 끄덕임과 눈 맞춤으로 반응한다","상대의 말을 요약·정리하며 이해를 확인한다"],
   ans:2,
   con:"공감적 듣기는 상대방의 감정과 입장을 이해하며 듣는 태도다. 자신의 경험만 늘어놓거나 평가하는 것은 공감적 듣기가 아니다.",
   rea:"③처럼 자신의 경험담만 이야기하며 상대를 평가하는 행동은 상대의 말에 집중하지 않는 것이므로 공감적 듣기와 거리가 멀다.",
   kil:"④(고개 끄덕임·눈 맞춤)를 오답으로 착각하기 쉽다. 비언어적 표현도 공감적 듣기의 중요한 요소다."},

  {unit:"2단원",sub:"공감하고 존중하며 대화하기",
   q:"갈등 상황에서 대화할 때 '나 전달법(I-message)'의 형식으로 알맞은 것은?",
   choices:["너는 항상 약속을 안 지키잖아.","네 행동이 문제야.","네가 늦게 와서 나는 정말 실망했어.","왜 그렇게 이기적으로 행동하는 거야?","너 때문에 기분이 나쁜 거야."],
   ans:2,
   con:"나 전달법: '나'를 주어로 하여 상대의 행동이 나에게 미친 영향과 내 감정을 표현한다. 상대를 비난하지 않아 방어심을 줄인다.",
   rea:"③ '네가 늦게 와서(상대 행동) 나는 실망했어(나의 감정)'처럼 나를 주어로 감정을 전달하므로 나 전달법이다.",
   kil:"①②④⑤는 모두 상대를 주어·대상으로 삼아 비난·평가하는 '너 전달법(You-message)'이다. '너는/네가~잖아/때문에'가 핵심 구별 단서."},

  {unit:"2단원",sub:"공감하고 존중하며 대화하기",
   passage:`A: "숙제 못 했어? 또? 진짜 왜 이래."
B: "……"`,
   q:"위 대화에서 A의 말하기 방식의 문제점은?",
   choices:["너무 짧게 말해서 의미 전달이 안 된다","상대를 비난·평가하는 말투로 상대방의 감정을 상하게 한다","경어를 사용하지 않아 예의가 없다","질문 형식으로 말해서 강요처럼 들린다","목소리가 너무 작아서 의사소통이 안 된다"],
   ans:1,
   con:"갈등 상황에서 '또', '왜 이래'처럼 상대를 비난하고 평가하는 말은 상대의 방어심을 자극하여 갈등을 심화시킨다.",
   rea:"'또?', '왜 이래'는 상대를 비난·평가하는 표현으로 공감·존중하는 대화 방식과 반대된다.",
   kil:"④ '질문 형식'을 문제로 보기 쉽지만, 문제는 형식이 아니라 비난하는 '내용과 태도'에 있다."},

  {unit:"2단원",sub:"공감하고 존중하며 대화하기",
   q:"다음 중 갈등 상황을 효과적으로 조정하는 대화 방법으로 가장 알맞은 것은?",
   choices:["상대방의 잘못을 조목조목 지적한다","자신의 주장만을 끝까지 반복해서 말한다","서로의 입장을 확인하고 타협점을 모색한다","침묵으로 일관하여 상대가 포기하게 만든다","목소리를 높여 강하게 주장한다"],
   ans:2,
   con:"갈등 조정 대화는 서로의 입장을 존중하며 공통점을 찾아 타협점을 모색하는 것이 핵심이다.",
   rea:"③처럼 서로의 입장을 확인하고 타협점을 찾는 것이 갈등 조정의 올바른 방법이다.",
   kil:"①②처럼 상대 비난이나 자기주장 반복은 갈등을 심화시킨다. '조정'의 핵심은 '상호 존중 + 타협'이다."},

  {unit:"2단원",sub:"공감하고 존중하며 대화하기",
   q:"대화의 맥락(상황)이 가장 잘 고려된 발화는?",
   choices:["(장례식장에서) 아, 오늘 너무 재밌다!","(병원에서 환자에게) 힘내세요, 곧 나을 거예요.","(도서관에서 친구에게 크게) 야, 이 책 진짜 재밌어!","(선생님께) 야, 선생님 잠깐만요.","(엄마 전화 중에) 엄마, 지금 바빠? 끊어."],
   ans:1,
   con:"발화는 상황·장소·상대·목적을 고려해야 한다. 병원에서 환자에게 위로의 말을 건네는 것은 맥락에 맞는 발화다.",
   rea:"②는 병원이라는 장소, 환자라는 상대, 위로라는 목적을 모두 고려한 적절한 발화다.",
   kil:"나머지는 모두 장소·상대·목적에 맞지 않는 발화다. '맥락'을 고려한다는 것은 장소·상대·목적 세 가지를 모두 따지는 것이다."},

  /* ── ② 피동·인용 표현 ── */
  {unit:"2단원",sub:"피동 표현과 인용 표현",
   q:"다음 중 피동 표현이 사용된 문장은?",
   choices:["나는 책을 읽었다.","선생님이 학생을 칭찬했다.","창문이 바람에 열렸다.","우리는 함께 노래를 불렀다.","고양이가 쥐를 잡았다."],
   ans:2,
   con:"피동 표현은 주어가 행동을 직접 하는 것이 아니라 행동을 당하는 형태로, '-이-/-히-/-리-/-기-' 또는 '-어지다/-게 되다'로 만든다.",
   rea:"③ '창문이 열렸다'에서 '열리-'는 '열다'에 피동 접미사 '-리-'가 붙어 창문이 행동을 '당하는' 피동 표현이다.",
   kil:"①②④⑤는 모두 주어가 직접 행동하는 능동 표현이다. '잡다→잡히다', '읽다→읽히다'처럼 피동 접미사 유무로 구분하자."},

  {unit:"2단원",sub:"피동 표현과 인용 표현",
   q:"다음 중 피동 표현으로 바꿀 수 없는 문장은?",
   choices:["언니가 강아지를 안았다.","바람이 나뭇잎을 흔들었다.","경찰이 도둑을 잡았다.","나는 밥을 먹었다.","선생님이 학생들을 칭찬했다."],
   ans:3,
   con:"'먹다'는 표준어 피동형이 없어 피동 표현으로 바꾸기 어렵다. '먹히다'는 다른 의미로 쓰이며 일반적 피동 변환이 안 된다.",
   rea:"'나는 밥을 먹었다'의 '먹다'는 자연스러운 피동형이 없어 피동 표현으로 바꿀 수 없다.",
   kil:"①'안다→안기다', ②'흔들다→흔들리다', ③'잡다→잡히다', ⑤'칭찬하다→칭찬받다'는 가능하다. '먹다'만 불가능함을 기억하자."},

  {unit:"2단원",sub:"피동 표현과 인용 표현",
   q:"'직접 인용'과 '간접 인용'의 차이로 알맞은 것은?",
   choices:["직접 인용은 말한 내용을 요약하고, 간접 인용은 그대로 전달한다","직접 인용은 큰따옴표와 '라고'를 쓰고, 간접 인용은 내용을 바꿔 '고'를 쓴다","간접 인용이 직접 인용보다 더 정확한 정보를 전달한다","직접 인용은 글에서만, 간접 인용은 말에서만 쓴다","두 표현 방식은 의미상 차이가 없다"],
   ans:1,
   con:"직접 인용: 원래 말을 그대로 큰따옴표로 묶고 '라고'를 붙임. 간접 인용: 말의 내용을 바꿔 표현하고 '고'를 붙임.",
   rea:"②가 직접·간접 인용의 형식적 차이를 정확히 설명한다.",

   con:"개성적인 발상과 표현은 관습적·사실적 기술을 넘어 새롭고 독창적인 방식으로 표현하는 것이다.",
   rea:"④ '하늘이 파랗다'는 사실을 그대로 기술한 것으로 개성적·독창적 표현과 거리가 멀다.",
   kil:"①②③⑤는 모두 반어·역설·상징·풍자를 활용한 개성적 표현이다. ④만 사실적 기술에 그친다는 점을 기억하자."}
];

var ALL_Q = Q2.concat(Q4);
var TOTAL = ALL_Q.length;

/* =====================================================================
   앱 상태
   ===================================================================== */
var S = {
  mode: "home",  /* home | quiz | result */
  idx: 0,
  picks: new Array(TOTAL).fill(null),  /* 각 문항 선택지 */
};

var app = document.getElementById("app");

/* =====================================================================
   렌더링
   ===================================================================== */
function render() {
  if (S.mode === "home") app.innerHTML = viewHome();
  else if (S.mode === "quiz") app.innerHTML = viewQuiz();
  else if (S.mode === "result") app.innerHTML = viewResult();
  window.scrollTo(0, 0);
}

/* ── HOME ── */
function viewHome() {
  return '<div class="hero">' +
    '<div class="eyebrow">천재(노미숙) 중2-1 국어 · 기말고사 대비</div>' +
    '<h1>만점 <b>스나이퍼</b></h1>' +
    '<p>2단원 전체 + 4단원 개성적인 발상과 표현 · 전체 풀고 마지막에 총점 확인</p>' +
    '<div class="stats">' +
      '<div class="stat"><div class="n">' + TOTAL + '</div><div class="l">전체 문항</div></div>' +
      '<div class="stat"><div class="n">' + Q2.length + '</div><div class="l">2단원</div></div>' +
      '<div class="stat"><div class="n">' + Q4.length + '</div><div class="l">4단원</div></div>' +
    '</div></div>' +
    '<div class="unit-row">' +
      '<span class="ubadge" style="background:#5B5BE6">2단원 소통으로 여는 세상</span>' +
      '<span class="ubadge" style="background:#E07B00">4단원 개성적인 발상과 표현</span>' +
    '</div>' +
    '<div class="sh"><div class="bar"></div><h2>시험 범위</h2></div>' +
    '<div class="info-grid">' +
      '<div class="icard"><div class="it">2단원 소단원①</div><div class="iv">공감하고 존중하며 대화하기</div></div>' +
      '<div class="icard"><div class="it">2단원 소단원②</div><div class="iv">피동 표현과 인용 표현 활용하기</div></div>' +
      '<div class="icard"><div class="it">4단원 소단원①</div><div class="iv">개성적인 발상과 표현</div></div>' +
      '<div class="icard"><div class="it">수록 작품</div><div class="iv">먼 후일·낙타·양반전</div></div>' +
    '</div>' +
    '<div class="sh"><div class="bar"></div><h2>풀이 방식</h2></div>' +
    '<div class="icard" style="margin-bottom:14px">' +
      '<div class="it">📋 시험 모드</div>' +
      '<div class="iv" style="margin-top:4px;font-weight:400;font-size:13.5px;line-height:1.7">' +
        '전체 ' + TOTAL + '문항을 순서대로 풀고<br>마지막에 <b>총점 + 틀린 문제 해설</b>을 확인합니다.' +
      '</div>' +
    '</div>' +
    '<button class="start-btn" data-act="start"><span>시험 시작하기</span><span class="go">→</span></button>' +
    '<div class="foot">교과서 단원 기반 학습용 콘텐츠 · 천재(노미숙) 중2-1</div>';
}

/* ── QUIZ ── */
function viewQuiz() {
  var q = ALL_Q[S.idx];
  var picked = S.picks[S.idx];
  var isLast = (S.idx === TOTAL - 1);
  var answered = picked !== null;

  /* 진행 바 */
  var pct = Math.round(((S.idx) / TOTAL) * 100);
  /* 상단바 색 */
  var unitColor = q.unit === "2단원" ? "#5B5BE6" : "#E07B00";

  var choicesHtml = "";
  for (var i = 0; i < q.choices.length; i++) {
    var cls = "ch";
    if (picked === i) cls += " sel";
    choicesHtml += '<button class="' + cls + '" data-act="pick" data-i="' + i + '">' +
      '<span class="cn">' + NUM[i] + '</span><span>' + esc(q.choices[i]) + '</span></button>';
  }

  var passage = q.passage ? '<div class="passage">' + esc(q.passage) + '</div>' : "";

  var btnLabel = answered
    ? (isLast ? "채점 결과 보기 →" : "다음 문제 →")
    : (isLast ? "마지막 문제 — 선지를 골라주세요" : "선지를 골라주세요");

  return '<div class="topbar">' +
    '<button class="exit-btn" data-act="home">← 나가기</button>' +
    '<span class="pill" style="background:' + unitColor + '">' + q.unit + ' · ' + esc(q.sub) + '</span>' +
    '<span class="qcnt">' + (S.idx + 1) + ' / ' + TOTAL + '</span>' +
    '</div>' +
    '<div class="progbar-wrap"><div class="progbar-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="qcard">' +
      '<div class="qtag">Q' + (S.idx + 1) + ' · ' + q.unit + '</div>' +
      '<div class="qtext">' + esc(q.q) + '</div>' +
      passage +
      '<div class="choices">' + choicesHtml + '</div>' +
    '</div>' +
    '<button class="nav-next" data-act="next"' + (answered ? "" : " disabled") + '>' + btnLabel + '</button>' +
    '<div class="foot" style="margin-top:18px">선지를 고르면 다음으로 이동할 수 있습니다.</div>';
}

/* ── RESULT ── */
function viewResult() {
  var score = 0;
  var wrongList = [];
  for (var i = 0; i < TOTAL; i++) {
    if (S.picks[i] === ALL_Q[i].ans) {
      score++;
    } else {
      wrongList.push(i);
    }
  }
  var pct = Math.round(score / TOTAL * 100);
  var deg = score / TOTAL * 360;

  /* 등급 */
  var grade, gradeColor;
  if (pct >= 90) { grade = "A+  완벽에 가까워!"; gradeColor = "#0FA372"; }
  else if (pct >= 80) { grade = "A  훌륭해!"; gradeColor = "#3B82F6"; }
  else if (pct >= 70) { grade = "B  잘 했어!"; gradeColor = "#8B5CF6"; }
  else if (pct >= 60) { grade = "C  조금 더 힘내봐!"; gradeColor = "#F59E0B"; }
  else { grade = "D  틀린 문제 꼭 복습!"; gradeColor = "#E5453C"; }

  /* 점수 링 */
  var ringHtml = '<div class="score-ring" style="background:conic-gradient(' + gradeColor + ' ' + deg + 'deg, rgba(255,255,255,.12) 0)">' +
    '<div class="score-inner"><b>' + score + '<span style="font-size:20px;color:#9DAAC4">/' + TOTAL + '</span></b><br><small>맞은 문항</small></div></div>';

  /* 영역별 점수 */
  var score2 = 0, score4 = 0;
  for (var j = 0; j < Q2.length; j++) if (S.picks[j] === Q2[j].ans) score2++;
  for (var k = 0; k < Q4.length; k++) if (S.picks[Q2.length + k] === Q4[k].ans) score4++;

  var areaHtml = '<div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">' +
    '<div class="icard" style="flex:1;min-width:120px;text-align:center">' +
      '<div class="it">2단원</div>' +
      '<div class="iv" style="font-size:22px;font-family:\'Black Han Sans\'">' + score2 + '/' + Q2.length + '</div>' +
    '</div>' +
    '<div class="icard" style="flex:1;min-width:120px;text-align:center">' +
      '<div class="it">4단원</div>' +
      '<div class="iv" style="font-size:22px;font-family:\'Black Han Sans\'">' + score4 + '/' + Q4.length + '</div>' +
    '</div>' +
  '</div>';

  /* 틀린 문제 해설 */
  var wrongHtml = "";
  if (wrongList.length === 0) {
    wrongHtml = '<div class="perfect">🎯 전문항 정답! 완벽해!</div>';
  } else {
    wrongHtml = '<div class="sh"><div class="bar"></div><h2>틀린 문제 해설</h2><span>' + wrongList.length + '문항</span></div>';
    for (var w = 0; w < wrongList.length; w++) {
      var wi = wrongList[w];
      var wq = ALL_Q[wi];
      var myAns = S.picks[wi];
      var myLabel = myAns !== null ? (NUM[myAns] + " " + wq.choices[myAns]) : "미선택";
      var correctLabel = NUM[wq.ans] + " " + wq.choices[wq.ans];
      var uc = wq.unit === "2단원" ? "#5B5BE6" : "#E07B00";

      wrongHtml += '<div class="wrong-item">' +
        '<div class="wrong-hd">Q' + (wi + 1) + ' · <span style="color:' + uc + '">' + wq.unit + '</span> · ' + esc(wq.sub) + '</div>' +
        '<div class="wrong-qtext">' + esc(wq.q) + '</div>' +
        (wq.passage ? '<div class="passage" style="margin-bottom:10px">' + esc(wq.passage) + '</div>' : '') +
        '<div class="wrong-my">❌ 내 답: ' + esc(myLabel) + '</div>' +
        '<div class="wrong-ans">✅ 정답: ' + esc(correctLabel) + '</div>' +
        '<div class="exp-block exp-b-con">' +
          '<div class="eh"><span class="mk con-mk">개</span>개념 매핑</div>' + esc(wq.con) +
        '</div>' +
        '<div class="exp-block exp-b-rea">' +
          '<div class="eh"><span class="mk rea-mk">✓</span>정답인 이유</div>' + esc(wq.rea) +
        '</div>' +
        '<div class="exp-block exp-b-kil">' +
          '<div class="eh"><span class="mk kil-mk">✕</span>오답 킬러<span class="kil-star">★ 핵심</span></div>' + esc(wq.kil) +
        '</div>' +
      '</div>';
    }
  }

  return '<div class="result-hero">' +
    '<div class="eyebrow">기말고사 모의 채점 결과</div>' +
    ringHtml +
    '<div class="score-sub">정확도 <b>' + pct + '%</b></div>' +
    '<div class="grade-tag" style="background:' + gradeColor + '">' + grade + '</div>' +
    '</div>' +
    areaHtml +
    wrongHtml +
    '<div class="act-row">' +
      '<button class="act-btn act-p" data-act="retry">다시 풀기</button>' +
      '<button class="act-btn act-s" data-act="home">홈으로</button>' +
    '</div>' +
    '<div class="foot">틀린 문제의 [오답 킬러] 부분을 형광펜처럼 체크해봐!</div>';
}

/* =====================================================================
   이벤트
   ===================================================================== */
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

app.addEventListener("click", function(ev) {
  var t = ev.target.closest("[data-act]");
  if (!t) return;
  var a = t.getAttribute("data-act");

  if (a === "start") {
    S.mode = "quiz"; S.idx = 0; S.picks = new Array(TOTAL).fill(null); render();
  } else if (a === "home") {
    S.mode = "home"; render();
  } else if (a === "retry") {
    S.mode = "quiz"; S.idx = 0; S.picks = new Array(TOTAL).fill(null); render();
  } else if (a === "pick") {
    var i = parseInt(t.getAttribute("data-i"), 10);
    if (S.picks[S.idx] !== null) return; /* 이미 선택함 */
    S.picks[S.idx] = i;
    /* 선택 즉시 시각 반영 */
    var chs = document.querySelectorAll(".ch");
    chs.forEach(function(c, idx) {
      if (idx === i) c.classList.add("sel");
      c.setAttribute("data-act", ""); /* 재클릭 방지 */
    });
    /* 다음 버튼 활성화 */
    var nb = document.querySelector(".nav-next");
    if (nb) {
      nb.disabled = false;
      var isLast = S.idx === TOTAL - 1;
      nb.textContent = isLast ? "채점 결과 보기 →" : "다음 문제 →";
    }
  } else if (a === "next") {
    if (S.picks[S.idx] === null) return;
    if (S.idx < TOTAL - 1) {
      S.idx++;
      render();
    } else {
      S.mode = "result";
      render();
    }
  }
});

render();
</script>
</body>
</html>
