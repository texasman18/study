<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#16223C" />
<title>만점 스나이퍼 · 중2-1 국어 기말 대비</title>
<meta name="description" content="중2-1 국어 기말고사 대비 — 3단계 입체 해설(개념 매핑·정답인 이유·오답 킬러)로 왜 틀렸는지까지 잡아내는 학습 앱." />
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{
  --ink:#16223C;--ink2:#33425F;--bg:#E9ECF3;--card:#FFFFFF;--line:#DCE2EC;
  --amber:#F59E0B;--amber-d:#C9760A;--indigo:#5B5BE6;--emerald:#0FA372;--red:#E5453C;--muted:#7C889E;
  font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--ink);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased;
}
.display{font-family:'Black Han Sans',sans-serif;font-weight:400;letter-spacing:-.01em}
.wrap{max-width:760px;margin:0 auto;padding:0 18px calc(80px + env(safe-area-inset-bottom))}
button{cursor:pointer;border:none;font-family:inherit;transition:transform .12s ease,box-shadow .12s ease,background .15s}
button:active{transform:translateY(1px)}
button:focus-visible{outline:3px solid var(--amber);outline-offset:2px}

.hero{background:radial-gradient(120% 100% at 80% -10%,#21345C 0%,#16223C 55%);border-radius:24px;padding:30px 26px 26px;color:#fff;position:relative;overflow:hidden;margin-top:22px}
.hero::after{content:"";position:absolute;right:-50px;top:-50px;width:230px;height:230px;pointer-events:none;
  background:radial-gradient(circle,transparent 0 38px,rgba(245,158,11,.16) 38px 40px,transparent 40px),
  radial-gradient(circle,transparent 0 62px,rgba(245,158,11,.10) 62px 64px,transparent 64px),
  radial-gradient(circle,transparent 0 86px,rgba(255,255,255,.06) 86px 88px,transparent 88px)}
.eyebrow{font-size:12.5px;letter-spacing:.22em;color:var(--amber);font-weight:700}
.hero h1{font-size:42px;line-height:1;margin:10px 0 6px}
.hero h1 b{color:var(--amber)}
.hero p{color:#B7C2D8;font-size:14px;max-width:380px}
.stats{display:flex;gap:22px;margin-top:20px;position:relative;z-index:1}
.stat .n{font-family:'Black Han Sans';font-size:26px;color:#fff;line-height:1}
.stat .l{font-size:11.5px;color:#90A0BC;margin-top:3px}

.sec-h{display:flex;align-items:baseline;gap:9px;margin:30px 2px 13px}
.sec-h .bar{width:5px;height:18px;background:var(--amber);border-radius:3px}
.sec-h h2{font-size:16px;font-weight:900}
.sec-h span{font-size:12px;color:var(--muted);margin-left:auto}

.cards{display:grid;gap:12px}
.cat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:14px;text-align:left;width:100%}
.cat:hover{box-shadow:0 6px 22px rgba(22,34,60,.10);transform:translateY(-2px)}
.cat .dot{width:42px;height:42px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;font-family:'Black Han Sans';font-size:18px;color:#fff}
.cat .tx{flex:1}
.cat .tx b{font-size:15.5px;font-weight:700;display:block}
.cat .tx small{font-size:12px;color:var(--muted)}
.cat .arw{color:var(--muted);font-size:20px}

.big{background:var(--ink);color:#fff;border-radius:18px;padding:20px 22px;display:flex;align-items:center;gap:16px;width:100%;text-align:left}
.big:hover{box-shadow:0 10px 30px rgba(22,34,60,.28);transform:translateY(-2px)}
.big .ico{width:46px;height:46px;flex:0 0 auto}
.big b{font-size:17px;font-weight:900;display:block}
.big small{font-size:12.5px;color:#9DAAC4}
.big .go{margin-left:auto;background:var(--amber);color:var(--ink);font-weight:900;padding:9px 16px;border-radius:10px;font-size:13.5px}

.top{display:flex;align-items:center;gap:12px;padding:18px 2px 6px}
.exit{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:7px 12px;font-size:13px;font-weight:700;color:var(--ink2)}
.pill{font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;color:#fff}
.time{margin-left:auto;font-family:'Black Han Sans';font-size:15px;color:var(--ink2);background:var(--card);border:1px solid var(--line);padding:5px 12px;border-radius:10px}
.time.run{color:var(--red)}

.prog{display:flex;gap:5px;flex-wrap:wrap;margin:8px 2px 0}
.prog i{width:9px;height:9px;border-radius:50%;background:#CFD6E2;display:inline-block}
.prog i.cur{outline:2px solid var(--ink);outline-offset:1px}
.prog i.ok{background:var(--emerald)}
.prog i.no{background:var(--red)}

.q{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px 20px;margin-top:14px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.qnum{font-size:12px;font-weight:700;color:var(--amber-d);letter-spacing:.04em}
.qtext{font-size:17px;font-weight:700;margin:6px 0 0;line-height:1.5}
.passage{background:#F4F6FA;border-left:4px solid var(--ink2);border-radius:0 10px 10px 0;padding:12px 15px;margin:14px 0 4px;font-size:14.5px;color:var(--ink2);white-space:pre-line}

.choices{display:grid;gap:9px;margin-top:16px}
.ch{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:13px 15px;display:flex;gap:11px;align-items:flex-start;text-align:left;font-size:15px;width:100%;color:var(--ink)}
.ch:hover{border-color:var(--ink2)}
.ch .cn{font-weight:900;flex:0 0 auto}
.ch.sel{border-color:var(--ink);background:#F2F5FB}
.ch.correct{border-color:var(--emerald);background:#E9F8F1}
.ch.wrong{border-color:var(--red);background:#FCEDEC}
.ch:disabled{cursor:default}
.ch .tag{margin-left:auto;font-size:11.5px;font-weight:800;flex:0 0 auto}

.submit{width:100%;margin-top:16px;background:var(--ink);color:#fff;font-weight:900;font-size:16px;padding:15px;border-radius:13px}
.submit:disabled{background:#AEB8CA}
.next{width:100%;margin-top:14px;background:var(--amber);color:var(--ink);font-weight:900;font-size:16px;padding:15px;border-radius:13px}

.exp{margin-top:16px;display:grid;gap:10px;animation:slide .3s ease}
@keyframes slide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.verdict{font-family:'Black Han Sans';font-size:18px;padding:4px 2px}
.verdict.ok{color:var(--emerald)}.verdict.no{color:var(--red)}
.block{border-radius:13px;padding:14px 16px;font-size:14.5px}
.block .h{font-weight:900;font-size:12.5px;letter-spacing:.02em;display:flex;align-items:center;gap:7px;margin-bottom:5px}
.block .h .mk{width:18px;height:18px;border-radius:5px;display:grid;place-items:center;color:#fff;font-size:12px;font-weight:900}
.b-con{background:#EEEFFE}.b-con .mk{background:var(--indigo)}.b-con .h{color:var(--indigo)}
.b-rea{background:#E8F8F1}.b-rea .mk{background:var(--emerald)}.b-rea .h{color:var(--emerald)}
.b-kil{background:#FCECEB;border:1.5px solid #F6C9C6}.b-kil .mk{background:var(--red)}.b-kil .h{color:var(--red)}
.b-kil .h .star{margin-left:auto;font-size:10.5px;background:var(--red);color:#fff;padding:2px 7px;border-radius:999px;letter-spacing:0}

.res-hero{background:var(--ink);color:#fff;border-radius:24px;padding:30px 24px;text-align:center;margin-top:22px}
.ring{width:150px;height:150px;margin:6px auto 4px;position:relative;border-radius:50%}
.ring .sc{position:absolute;inset:11px;display:grid;place-items:center;background:var(--ink);border-radius:50%}
.ring .sc b{font-family:'Black Han Sans';font-size:46px;line-height:.9}
.ring .sc small{font-size:12px;color:#9DAAC4}
.acc{font-size:14px;color:#B7C2D8;margin-top:4px}.acc b{color:var(--amber);font-weight:900}
.tbl{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-top:16px}
.tr{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);font-size:14px}
.tr:last-child{border-bottom:none}
.tr .nm{font-weight:700;flex:1;display:flex;align-items:center;gap:9px}
.tr .nm i{width:10px;height:10px;border-radius:3px}
.tr .ba{width:120px;height:8px;background:#EDF0F5;border-radius:99px;overflow:hidden;margin:0 12px}
.tr .ba span{display:block;height:100%;background:var(--emerald);border-radius:99px}
.tr .vv{font-family:'Black Han Sans';font-size:14px;width:46px;text-align:right}
.actions{display:grid;gap:10px;grid-template-columns:1fr 1fr;margin-top:16px}
.act{padding:14px;border-radius:13px;font-weight:900;font-size:14.5px}
.act.p{background:var(--ink);color:#fff}.act.s{background:var(--card);border:1px solid var(--line);color:var(--ink)}
.act.full{grid-column:1/3;background:var(--amber);color:var(--ink)}

.essay{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px 20px;margin-top:14px}
.cond{background:#FFF7E8;border:1px solid #F3DCA8;border-radius:11px;padding:11px 14px;font-size:13.5px;margin-top:12px;color:#8a6400}
.cond b{color:var(--amber-d)}
.reveal{width:100%;margin-top:14px;background:var(--ink);color:#fff;font-weight:900;font-size:15px;padding:13px;border-radius:12px}
.model{margin-top:14px;animation:slide .3s}
.model .lab{font-size:12px;font-weight:900;color:var(--emerald);margin-bottom:5px}
.model .ans{background:#E8F8F1;border-radius:11px;padding:13px 15px;font-size:14.5px}
.model .lab2{font-size:12px;font-weight:900;color:var(--red);margin:13px 0 5px}
.model .rub{background:#FCECEB;border-radius:11px;padding:11px 15px 11px 30px;font-size:13.5px}
.model .rub li{margin:3px 0}

.foot{text-align:center;color:var(--muted);font-size:11.5px;margin-top:34px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media (max-width:480px){.hero h1{font-size:34px}.stats{gap:16px}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* ===== 조준선 SVG ===== */
function reticle(size){size=size||46;var c='#F59E0B';
  return '<svg viewBox="0 0 48 48" width="'+size+'" height="'+size+'" fill="none">'+
  '<circle cx="24" cy="24" r="20" stroke="'+c+'" stroke-width="2" opacity=".5"/>'+
  '<circle cx="24" cy="24" r="11" stroke="'+c+'" stroke-width="2"/>'+
  '<circle cx="24" cy="24" r="2.5" fill="'+c+'"/>'+
  '<path d="M24 1v9M24 38v9M1 24h9M38 24h9" stroke="'+c+'" stroke-width="2" stroke-linecap="round"/></svg>';}

/* ===== 데이터 ===== */
var CATS={
  lit :{name:"문학",color:"#5B5BE6",desc:"표현법 · 운율 · 소설 구성 · 심상"},
  gram:{name:"문법",color:"#0FA372",desc:"담화 · 음운 · 단어 · 품사 · 어휘"},
  read:{name:"읽기",color:"#E07B00",desc:"설명 방법 · 글의 통일성"},
  voca:{name:"어휘",color:"#C0497B",desc:"한자성어 · 속담 · 관용어"}
};

var Q=[
/* ══ 문학 (17문항) ══════════════════════════════════════════════════════ */
{cat:"lit",topic:"반어와 역설",passage:`"시험을 망쳤는데 엄마는 나를 보고 '잘~한다, 잘해!'라며 한숨을 쉬셨다."`,
 q:"위 보기의 밑줄 친 부분과 같은 표현 방법이 쓰인 시구는?",
 choices:["죽어도 아니 눈물 흘리우리다","이것은 소리 없는 아우성","찬란한 슬픔의 봄을","외로운 황홀한 심사이어니","두 볼에 흐르는 빛이 고와서 서러워라"],ans:0,
 con:"반어(아이러니)는 속마음과 반대로 말하는 것, 역설은 문장 자체가 모순이지만 그 속에 진실을 담는 것. 보기는 속마음과 반대로 말한 '반어'다.",
 rea:"①은 김소월 '진달래꽃'으로, 속으로는 눈물이 나지만 겉으로는 울지 않겠다고 반대로 말한 반어법이라 보기와 같다.",
 kil:"②~⑤는 모두 '소리 없는 아우성 / 찬란한 슬픔 / 외로운 황홀 / 고와서 서러워라'처럼 동시에 공존할 수 없는 말이 부딪히는 역설이다. '반대로 말하기(반어)'와 '말이 안 되기(역설)'를 꼭 구별하자."},
{cat:"lit",topic:"비유 - 은유",q:`"내 마음은 호수요"에 쓰인 표현 방법은?`,
 choices:["직유법","은유법","의인법","반복법","과장법"],ans:1,
 con:"은유는 'A는 B이다' 형식으로 원관념과 보조관념을 직접 연결한다. 직유는 '~처럼/같이'를 쓴다.",
 rea:"'내 마음(원관념)은 호수(보조관념)요'처럼 연결어 없이 바로 빗댔으므로 은유다.",
 kil:"'~처럼/같이/듯이'가 보이면 직유다. 여기엔 그 말이 없는데도 직유 ①로 고르면 함정에 걸린다."},
{cat:"lit",topic:"비유 - 의인",q:`"꽃이 방긋 웃는다"에 쓰인 표현 방법은?`,
 choices:["직유법","은유법","의인법","대구법","도치법"],ans:2,
 con:"의인법은 사람이 아닌 대상에게 사람의 행동·감정을 부여하는 표현이다.",
 rea:"꽃(사물)이 '웃는다'는 사람의 행동을 하므로 의인법이다.",
 kil:"활유법과 헷갈리지 말 것. 활유는 무생물에 '생명·움직임'만 주는 것이고, '웃다·말하다'처럼 사람만의 행동이면 의인법이다."},
{cat:"lit",topic:"비유 - 직유",q:`"내 누나의 얼굴은 달처럼 둥글다"에서 쓰인 표현 방법과 그 근거로 맞는 것은?`,
 choices:["은유법 — '달'이 원관념이므로","직유법 — '처럼'이라는 연결어가 있으므로","의인법 — 달이 사람처럼 묘사되므로","상징 — 달이 추상적 관념을 나타내므로","과장법 — 실제와 다르게 부풀려서"],ans:1,
 con:"직유는 '~처럼/같이/듯이' 같은 연결어를 써서 두 대상을 비교한다.",
 rea:"'달처럼'에 연결어 '처럼'이 있으므로 직유법이다. 원관념은 '누나의 얼굴', 보조관념은 '달'이다.",
 kil:"①처럼 '달'을 원관념으로 뒤바꾸는 오답이 잘 나온다. 비유에서 원관념은 설명하려는 대상(누나의 얼굴), 보조관념은 비교 수단(달)임을 기억하자."},
{cat:"lit",topic:"상징",q:"'비둘기'로 평화를 나타내듯, 추상적 관념을 구체적 사물로 드러내는 표현 방법은?",
 choices:["비유","상징","반어","운율","심상"],ans:1,
 con:"상징은 원관념을 숨기고 보조관념만 제시해 추상적 의미를 드러낸다. 비유는 두 대상의 유사성이 분명하다.",
 rea:"비둘기(구체물)로 평화(추상)를 나타내며 원관념 '평화'가 직접 드러나지 않으므로 상징이다.",
 kil:"비유는 원관념-보조관념이 1:1로 분명하지만, 상징은 의미가 여러 갈래로 열려 있다. '~같다'로 바꿔 자연스러우면 비유, 어색하면 상징이다."},
{cat:"lit",topic:"운율",q:"글자 수·음보의 규칙적 반복처럼 겉으로 드러나는 리듬을 무엇이라 하는가?",
 choices:["내재율","외형률","산문율","압운","음성률"],ans:1,
 con:"운율은 시의 리듬이다. 외형률은 규칙이 겉으로 드러나고(음수율·음보율), 내재율은 자유시처럼 내면에 은근히 흐른다.",
 rea:"'규칙적 반복이 겉으로 드러난다'고 했으므로 외형률이다.",
 kil:"현대 자유시는 대부분 내재율이고, 시조·민요처럼 형식이 정해진 정형시가 외형률이다. '드러난다'는 표현이 핵심 단서."},
{cat:"lit",topic:"시조의 형식",passage:`청산리 벽계수야 수이 감을 자랑 마라
일도 창해하면 다시 오기 어려워라
명월이 만공산하니 쉬어 간들 어떠리`,
 q:"위 시조의 형식에 대한 설명으로 옳지 않은 것은?",
 choices:["3장 6구 45자 내외의 정형시다","초장·중장·종장으로 구성된다","종장의 첫 음보는 반드시 3음절이다","작자는 황진이로 알려져 있다","내재율로 유연하게 흐르는 시다"],ans:4,
 con:"시조는 3장(초장·중장·종장) 6구 45자 내외의 정형시로, 3·4조 또는 4·4조 음수율의 외형률을 가진다.",
 rea:"시조는 글자 수와 음수율이 규칙적으로 드러나는 '외형률' 시다. '내재율'이라는 ⑤가 틀렸다.",
 kil:"종장 첫 음보가 3음절이라는 ③은 시조의 중요한 특징이라 함정처럼 보이지만 맞는 설명이다. '외형률↔내재율'의 구분이 핵심 포인트."},
{cat:"lit",topic:"소설 구성단계",q:"갈등이 최고조에 이르고 사건 해결의 실마리가 보이는 소설 구성 단계는?",
 choices:["발단","전개","위기","절정","결말"],ans:3,

{cat:"lit",topic:"갈등의 유형",q:`"친구를 도와줄까 말까 마음속으로 고민하는" 상황의 갈등 유형은?`,

{cat:"lit",topic:"소설의 시점",q:"작품 밖 서술자가 모든 인물의 속마음까지 다 아는 듯 서술하는 시점은?",

{cat:"lit",topic:"1인칭 관찰자 시점",passage:`나는 옆 집 영수가 매일 밤 혼자 공부하는 모습을 창문 너머로 지켜봤다. 그가 무슨 생각을 하는지는 알 수 없었지만, 그의 눈빛은 언제나 무언가를 향해 타오르고 있었다.`,

{cat:"lit",topic:"표현법 - 대구",q:`"하늘은 높고 바다는 깊다"처럼 비슷한 구조의 구절을 나란히 짝지은 표현법은?`,

{cat:"lit",topic:"표현법 - 설의",q:"답이 정해진 것을 일부러 물음의 형식으로 강조하는 표현법은?",

 q:"'새옹지마(塞翁之馬)'의 뜻을 쓰고, 이 성어를 사용하기에 알맞은 상황을 한 가지 만들어 쓰시오.",
 cond:"뜻 + 구체적 상황 예시 포함.",
 model:"뜻: 인생의 길흉화복은 예측하기 어려움(나쁜 일이 좋은 일이 되기도 하고 그 반대도 됨). 상황 예: 시험에 떨어져 낙심했는데, 덕분에 더 좋은 회사에 합격하게 되었다.",
 rub:["뜻을 '좋은 일만 일어난다'처럼 왜곡하면 0점","상황이 '나쁜 일 → 좋은 결과' 또는 '좋은 일 → 나쁜 결과' 구조가 아니면 -50%","뜻만 쓰고 상황 없으면 -50%"]},
{cat:"lit",topic:"표현법 효과 서술",
 q:`다음 시구에서 사용된 표현법 두 가지를 찾고, 각각의 효과를 한 문장씩 서술하시오.`,
 cond:`시구: "내 마음은 호수요, / 그대 노 저어 오오."`,
 model:"① 은유법('내 마음은 호수요') — 마음의 고요하고 깊은 상태를 호수에 빗대어 시각적으로 선명하게 표현하는 효과가 있다. ② 도치법('그대 노 저어 오오'는 청자를 앞세워 어순을 바꿈) — 청자를 향한 간절한 바람을 강조하는 효과가 있다.",
 rub:["표현법 2개 중 1개만 맞히면 50% 부분 점수","표현법은 맞혔으나 효과 서술이 없으면 항목당 -50%","효과를 '생생하다'처럼 막연하게 쓰면 -20%"]},
{cat:"read",topic:"주제 통일성 판단",
 q:"다음 글에서 주제의 통일성을 해치는 문장을 찾아 쓰고, 그 이유를 서술하시오.",
 cond:`지문: "독서는 어휘력을 키워 준다. 꾸준히 책을 읽으면 다양한 단어를 자연스럽게 익힐 수 있다. 요즘은 전자책도 많이 보급되어 있다. 어휘력이 늘면 글쓰기 실력도 함께 향상된다." 주제: 독서가 어휘력과 글쓰기 실력에 미치는 영향.`,
 model:"문장: '요즘은 전자책도 많이 보급되어 있다.' / 이유: 이 문장은 '독서의 어휘력·글쓰기 효과'라는 주제와 직접 관련이 없고, 전자책 보급이라는 별개의 정보를 제공하여 글의 통일성을 깨뜨리기 때문이다.",
 rub:["해당 문장을 정확히 찾았으나 이유 서술 없으면 -50%","이유에 '주제 이탈'이 명시되지 않으면 -30%","틀린 문장을 지목하면 0점"]}
];

/* ===== 상태 ===== */
var S={mode:"home",pool:[],poolName:"",idx:0,picked:null,submitted:false,answers:[],exam:false,sec:0,timer:null,essayOpen:{}};
var NUM="①②③④⑤⑥";
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmt(t){return ("0"+Math.floor(t/60)).slice(-2)+":"+("0"+(t%60)).slice(-2);}

function startTimer(){stopTimer();S.timer=setInterval(function(){S.sec++;var el=document.getElementById("timer");if(el)el.textContent=fmt(S.sec);},1000);}
function stopTimer(){if(S.timer){clearInterval(S.timer);S.timer=null;}}

function start(list,name,isExam){S.pool=list;S.poolName=name;S.idx=0;S.picked=null;S.submitted=false;S.answers=[];S.exam=isExam;S.sec=0;S.mode="quiz";render();if(isExam)startTimer();}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

/* ===== 렌더 ===== */
var app=document.getElementById("app");
function render(){
  if(S.mode==="home")app.innerHTML=viewHome();
  else if(S.mode==="quiz")app.innerHTML=viewQuiz();
  else if(S.mode==="result")app.innerHTML=viewResult();
  else if(S.mode==="essay")app.innerHTML=viewEssay();
  window.scrollTo(0,0);
}

function viewHome(){
  var cats="";for(var k in CATS){var c=CATS[k];
    cats+='<button class="cat" data-act="cat" data-cat="'+k+'"><div class="dot" style="background:'+c.color+'">'+c.name[0]+'</div><div class="tx"><b>'+c.name+'</b><small>'+c.desc+'</small></div><div class="arw">›</div></button>';}
  return '<div class="hero"><div class="eyebrow">중2-1 국어 · 기말고사 대비</div>'+
    '<h1 class="display">만점 <b>스나이퍼</b></h1>'+
    '<p>정답만 외우지 말고 <b style="color:#fff">왜 틀렸는지</b>를 잡아내자. 모든 문제에 3단계 입체 해설 — 개념 매핑 · 정답인 이유 · 오답 킬러.</p>'+
    '<div class="stats"><div class="stat"><div class="n">'+Q.length+'</div><div class="l">객관식 문항</div></div>'+
    '<div class="stat"><div class="n">'+ESSAY.length+'</div><div class="l">서술형 클리닉</div></div>'+
    '<div class="stat"><div class="n">4</div><div class="l">출제 영역</div></div></div></div>'+
    '<div class="sec-h"><div class="bar"></div><h2>영역별 정조준 연습</h2><span>틀린 개념만 집중</span></div>'+
    '<div class="cards">'+cats+'</div>'+
    '<div class="sec-h"><div class="bar"></div><h2>실전 모드</h2></div>'+
    '<div class="cards"><button class="big" data-act="all"><div class="ico">'+reticle(46)+'</div>'+
    '<div><b>전체 모의고사</b><small>'+Q.length+'문항 무작위 · 타이머 ON</small></div><div class="go">시작</div></button>'+
    '<button class="cat" data-act="goEssay"><div class="dot" style="background:#16223C">술</div>'+
    '<div class="tx"><b>서술형 클리닉</b><small>모범답안 · 조건별 감점 기준으로 셀프 채점</small></div><div class="arw">›</div></button></div>'+
    '<div class="foot">교과 공통 성취기준(천재·미래엔·동아·비상 공통 단원) 기반 · 학습용 콘텐츠</div>';
}

function viewQuiz(){
  var cur=S.pool[S.idx],c=CATS[cur.cat];
  var prog="";for(var i=0;i<S.pool.length;i++){var cl="";if(i===S.idx)cl+="cur ";if(S.answers[i])cl+=(S.answers[i].correct?"ok":"no");prog+='<i class="'+cl+'"></i>';}
  var choices="";for(var j=0;j<cur.choices.length;j++){
    var cls="ch",tag="";
    if(!S.submitted&&S.picked===j)cls+=" sel";
    if(S.submitted&&j===cur.ans){cls+=" correct";tag='<span class="tag" style="color:var(--emerald)">정답</span>';}
    if(S.submitted&&S.picked===j&&j!==cur.ans){cls+=" wrong";tag='<span class="tag" style="color:var(--red)">내 선택</span>';}
    choices+='<button class="'+cls+'" '+(S.submitted?"disabled":'data-act="pick" data-i="'+j+'"')+'><span class="cn">'+NUM[j]+'</span><span>'+esc(cur.choices[j])+'</span>'+tag+'</button>';
  }
  var bottom;
  if(!S.submitted){
    bottom='<button class="submit" '+(S.picked===null?"disabled":'data-act="submit"')+'>'+(S.picked===null?"선지를 골라줘":"정답 확인 & 해설 보기")+'</button>';
  }else{
    var ok=S.picked===cur.ans;
    bottom='<div class="exp">'+
      '<div class="verdict '+(ok?"ok":"no")+'">'+(ok?"명중! 정확히 조준했어":"빗나감 — 아래 해설로 다시 조준하자")+'</div>'+
      '<div class="block b-con"><div class="h"><span class="mk">개</span>개념 매핑</div>'+esc(cur.con)+'</div>'+
      '<div class="block b-rea"><div class="h"><span class="mk">✓</span>정답인 이유</div>'+esc(cur.rea)+'</div>'+
      '<div class="block b-kil"><div class="h"><span class="mk">✕</span>오답 킬러<span class="star">★ 가장 많이 틀림</span></div>'+esc(cur.kil)+'</div>'+
      '</div><button class="next" data-act="next">'+(S.idx+1<S.pool.length?"다음 문제 →":"결과 확인하기")+'</button>';
  }
  return '<div class="top"><button class="exit" data-act="exit">← 나가기</button>'+
    '<span class="pill" style="background:'+c.color+'">'+c.name+' · '+esc(cur.topic)+'</span>'+
    (S.exam?'<span class="time'+(S.submitted?"":" run")+'" id="timer">'+fmt(S.sec)+'</span>':'')+'</div>'+
    '<div class="prog">'+prog+'</div>'+
    '<div class="q"><div class="qnum">Q'+(S.idx+1)+' / '+S.pool.length+'</div>'+
    '<div class="qtext">'+esc(cur.q)+'</div>'+
    (cur.passage?'<div class="passage">'+esc(cur.passage)+'</div>':'')+
    '<div class="choices">'+choices+'</div>'+bottom+'</div>';
}

function viewResult(){
  var total=S.pool.length,score=0,byCat={};
  for(var i=0;i<S.pool.length;i++){var k=S.pool[i].cat;byCat[k]=byCat[k]||{t:0,c:0};byCat[k].t++;if(S.answers[i]&&S.answers[i].correct){byCat[k].c++;score++;}}
  var acc=Math.round(score/total*100),deg=score/total*360;
  var rows="";for(var kk in byCat){var v=byCat[kk];rows+='<div class="tr"><div class="nm"><i style="background:'+CATS[kk].color+'"></i>'+CATS[kk].name+'</div><div class="ba"><span style="width:'+(v.c/v.t*100)+'%"></span></div><div class="vv">'+v.c+'/'+v.t+'</div></div>';}
  var wrongN=0;for(var w=0;w<S.answers.length;w++)if(S.answers[w]&&!S.answers[w].correct)wrongN++;
  var wb=wrongN?'<button class="act full" data-act="wrong">오답만 다시 정조준 ('+wrongN+'문항)</button>':'';
  return '<div class="res-hero"><div class="eyebrow">'+esc(S.poolName)+' 결과</div>'+
    '<div class="ring" style="background:conic-gradient(var(--amber) '+deg+'deg, rgba(255,255,255,.14) 0)">'+
    '<div class="sc"><div><b>'+score+'<span style="font-size:22px;color:#9DAAC4">/'+total+'</span></b><br><small>명중 문항</small></div></div></div>'+
    '<div class="acc">정확도 <b>'+acc+'%</b>'+(S.exam?' · 소요 시간 '+fmt(S.sec):'')+'</div></div>'+
    '<div class="sec-h"><div class="bar"></div><h2>영역별 명중률</h2></div>'+
    '<div class="tbl">'+rows+'</div>'+
    '<div class="actions">'+wb+
    '<button class="act p" data-act="retry">다시 풀기</button>'+
    '<button class="act s" data-act="home">홈으로</button></div>'+
    '<div class="foot">오답 킬러 부분을 다시 읽으며 "왜 낚였는지"를 점검하면 메타인지가 올라간다.</div>';
}

function viewEssay(){
  var out='<div class="top"><button class="exit" data-act="home">← 나가기</button><span class="pill" style="background:#16223C">서술형 클리닉</span></div>'+
    '<div class="sec-h"><div class="bar"></div><h2>조건별 감점 기준으로 셀프 채점</h2></div>';
  for(var i=0;i<ESSAY.length;i++){var e=ESSAY[i],c=CATS[e.cat];
    var body;
    if(!S.essayOpen[i]){body='<button class="reveal" data-act="reveal" data-i="'+i+'">먼저 답을 쓴 뒤 — 모범답안 & 감점 기준 보기</button>';}
    else{var rub="";for(var r=0;r<e.rub.length;r++)rub+='<li>'+esc(e.rub[r])+'</li>';
      body='<div class="model"><div class="lab">모범 답안</div><div class="ans">'+esc(e.model)+'</div>'+
      '<div class="lab2">조건별 감점 기준</div><ul class="rub">'+rub+'</ul></div>';}
    out+='<div class="essay"><span class="pill" style="background:'+c.color+';display:inline-block;margin-bottom:8px">'+c.name+' · '+esc(e.topic)+'</span>'+
      '<div class="qtext">'+esc(e.q)+'</div><div class="cond"><b>조건</b> · '+esc(e.cond)+'</div>'+body+'</div>';
  }
  out+='<div class="foot">서술형은 \'키워드 + 조건 충족\'이 핵심. 감점 포인트를 형광펜처럼 체크하자.</div>';
  return out;
}

/* ===== 이벤트(위임) ===== */
app.addEventListener("click",function(ev){
  var t=ev.target.closest("[data-act]");if(!t)return;
  var a=t.getAttribute("data-act");
  if(a==="cat")start(Q.filter(function(x){return x.cat===t.getAttribute("data-cat");}),CATS[t.getAttribute("data-cat")].name,false);
  else if(a==="all")start(shuffle(Q),"전체 모의고사",true);
  else if(a==="goEssay"){S.mode="essay";S.essayOpen={};render();}
  else if(a==="exit"){stopTimer();S.mode="home";render();}
  else if(a==="home"){stopTimer();S.mode="home";render();}
  else if(a==="pick"){S.picked=parseInt(t.getAttribute("data-i"),10);render();}
  else if(a==="submit"){
    if(S.picked===null)return;var cur=S.pool[S.idx];var correct=S.picked===cur.ans;
    S.answers[S.idx]={correct:correct,cat:cur.cat};S.submitted=true;stopTimer();render();
  }
  else if(a==="next"){
    if(S.idx+1<S.pool.length){S.idx++;S.picked=null;S.submitted=false;render();if(S.exam)startTimer();}
    else{stopTimer();S.mode="result";render();}
  }
  else if(a==="retry")start(S.pool,S.poolName,S.exam);
  else if(a==="wrong"){var wr=S.pool.filter(function(_,i){return S.answers[i]&&!S.answers[i].correct;});if(wr.length)start(wr,"오답 다시 풀기",false);}
  else if(a==="reveal"){S.essayOpen[parseInt(t.getAttribute("data-i"),10)]=true;render();}
});

render();
</script>
</body>
</html>
